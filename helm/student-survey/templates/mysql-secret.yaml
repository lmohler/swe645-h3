# Author: Lucas Mohler
# Credentials for the MySQL Pod, also read by the backend Deployment via
# secretKeyRef so the password is never duplicated in plain values.
apiVersion: v1
kind: Secret
metadata:
  name: survey-mysql-secret
  labels:
    {{- include "student-survey.labels" . | nindent 4 }}
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: {{ .Values.mysql.rootPassword | quote }}
  MYSQL_DATABASE: {{ .Values.mysql.database | quote }}
  MYSQL_USER: {{ .Values.mysql.user | quote }}
  MYSQL_PASSWORD: {{ .Values.mysql.password | quote }}
