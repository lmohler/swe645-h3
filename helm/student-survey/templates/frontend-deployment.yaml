# Author: Lucas Mohler
# Frontend Pod serving the built React app via nginx, which also proxies
# /api/ requests to the backend Service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: survey-frontend
  labels:
    {{- include "student-survey.labels" . | nindent 4 }}
    app: survey-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: survey-frontend
  template:
    metadata:
      labels:
        app: survey-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
