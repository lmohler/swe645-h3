# Author: Lucas Mohler
# Single-replica MySQL Pod backing the survey persistence layer, with data
# stored on the PVC and credentials injected from the mysql Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: survey-mysql
  labels:
    {{- include "student-survey.labels" . | nindent 4 }}
    app: survey-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: survey-mysql
  template:
    metadata:
      labels:
        app: survey-mysql
    spec:
      containers:
        - name: mysql
          image: {{ .Values.mysql.image }}
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: survey-mysql-secret
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: survey-mysql-pvc
