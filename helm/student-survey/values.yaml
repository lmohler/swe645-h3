# Author: Lucas Mohler
# Default configuration values for the student-survey Helm chart.
# Override with --set or -f my-values.yaml at install/upgrade time.

frontend:
  image:
    repository: lmohler/survey-frontend
    tag: "1.0.0"
  replicaCount: 1
  service:
    type: NodePort
    port: 80
    nodePort: 30080

backend:
  image:
    repository: lmohler/survey-backend
    tag: "1.0.0"
  replicaCount: 1
  service:
    port: 8000

mysql:
  image: mysql:8.4
  rootPassword: changeme-root-password
  database: survey_db
  user: survey_user
  password: changeme-user-password
  persistence:
    size: 1Gi
    hostPath: /var/lib/survey-mysql-data
