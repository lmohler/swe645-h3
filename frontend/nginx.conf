# Author: Lucas Mohler
# nginx config for the frontend container: serves the built React SPA and
# reverse-proxies /api/ to the backend's Kubernetes Service (named
# survey-backend in the Helm chart), so the browser only ever talks to the
# frontend's own origin and CORS never comes into play in production.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://survey-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FastAPI serves its interactive Swagger/OpenAPI docs at the root path
    # (not under /api), so those routes get their own proxy entries.
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://survey-backend:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri /index.html;
    }
}
